# Task-to-Tool Mapping Overrides
# ================================
#
# Maps task description phrases (lowercased) to tool names.
# The ReAct loop engine uses this to match tasks from agent
# task_decomposition to the correct registered tool handler.
#
# Rules:
#   - Keys MUST be lowercase
#   - Longer/more-specific phrases are matched first
#   - Values MUST match a tool name registered in the agent's ToolRegistry
#   - Keep entries grouped by agent for readability
#
# Adding a new tool:
#   1. Register the handler in the agent's build_tool_registry()
#   2. Add the task phrase to the agent's task_decomposition
#   3. Add a mapping entry here

