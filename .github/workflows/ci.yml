name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

# ─── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  # ── Backend: lint + type-check + unit tests ──────────────────────────────────
  backend-test:
    name: Backend — lint & tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: forensic_user
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: forensic_council_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U forensic_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        working-directory: backend
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Pyright type check
        working-directory: backend
        run: uv run pyright --project pyproject.toml
        continue-on-error: true   # treat as advisory until full annotations added

      - name: Run backend tests
        env:
          APP_ENV: testing
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: forensic_user
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: forensic_council_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SIGNING_KEY: ci-test-signing-key-that-is-long-enough-32c
          JWT_SECRET_KEY: ci-test-jwt-secret-long-enough-32chars
          LLM_PROVIDER: none
          LLM_API_KEY: ci-stub-key
          BOOTSTRAP_ADMIN_PASSWORD: ci-admin-pw-test
          BOOTSTRAP_INVESTIGATOR_PASSWORD: ci-inv-pw-test
        # Run from project root so root pytest.ini applies (pythonpath = . backend).
        # Use the backend venv explicitly — uv can't discover pyproject.toml from
        # the repo root, so `uv run` would silently use the wrong Python environment.
        run: |
          backend/.venv/bin/python -m pytest tests/backend/ tests/infra/ tests/connectivity/ \
            -v --tb=short \
            --cov=backend --cov-report=xml --cov-report=term-missing \
            -p no:warnings

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          flags: backend
        continue-on-error: true

  # ── Backend: Docker build ─────────────────────────────────────────────────────
  backend-docker:
    name: Backend — Docker build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (production target)
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: forensic-council-backend:ci

  # ── Frontend: lint + type-check + build ──────────────────────────────────────
  frontend-test:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build (production)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_DEMO_PASSWORD: ci-test-password
        run: npm run build

      - name: Run frontend tests
        run: npm test -- --watchAll=false --passWithNoTests

  # ── Frontend: Docker build ────────────────────────────────────────────────────
  frontend-docker:
    name: Frontend — Docker build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend (runner target)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          target: runner
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
            NEXT_PUBLIC_DEMO_PASSWORD=ci-placeholder
          tags: forensic-council-frontend:ci

  # ── Security: dependency audit ────────────────────────────────────────────────
  security-audit:
    name: Security — dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Python dependency audit (pip-audit)
        working-directory: backend
        run: |
          uv tool install pip-audit
          uv run pip-audit --requirement <(uv export --no-dev --format requirements-txt) \
            --ignore-vuln GHSA-jfh8-c2jp-5hhc  # cryptography false-positive on some runners
        continue-on-error: true   # advisory — don't block on transitive issues

      - name: Node dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true   # advisory

  # ── Integration smoke test ────────────────────────────────────────────────────
  integration-smoke:
    name: Integration — smoke test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copy .env for CI
        run: |
          cp .env.example .env
          sed -i 's/^APP_ENV=.*/APP_ENV=development/' .env
          sed -i 's/^SIGNING_KEY=.*/SIGNING_KEY=ci-signing-key-that-is-long-enough-32c/' .env
          sed -i 's/^BOOTSTRAP_ADMIN_PASSWORD=.*/BOOTSTRAP_ADMIN_PASSWORD=ci-admin-pw/' .env
          sed -i 's/^BOOTSTRAP_INVESTIGATOR_PASSWORD=.*/BOOTSTRAP_INVESTIGATOR_PASSWORD=ci-inv-pw/' .env
          sed -i 's|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=http://localhost:8000|' .env
          sed -i 's/^NEXT_PUBLIC_DEMO_PASSWORD=.*/NEXT_PUBLIC_DEMO_PASSWORD=ci-inv-pw/' .env
          sed -i 's/^LLM_API_KEY=.*/LLM_API_KEY=ci-stub/' .env
          sed -i 's/^LLM_PROVIDER=.*/LLM_PROVIDER=none/' .env

      - name: Start infrastructure only
        run: |
          docker compose -f docs/docker/docker-compose.yml -f docs/docker/docker-compose.infra.yml --env-file .env up -d
          sleep 10

      - name: Start backend
        run: |
          docker compose -f docs/docker/docker-compose.yml --env-file .env up -d backend
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend healthy after ${i}x2s"
              break
            fi
            sleep 2
          done

      - name: Verify /health returns 200
        run: curl -sf http://localhost:8000/health | python3 -m json.tool

      - name: Verify /api/v1/auth/login rejects bad creds
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/v1/auth/login \
            -d "username=nobody&password=wrong")
          test "$CODE" = "401" && echo "Login rejection OK ($CODE)" || (echo "Unexpected: $CODE"; exit 1)

      - name: Tear down
        if: always()
        run: docker compose -f docs/docker/docker-compose.yml -f docs/docker/docker-compose.infra.yml --env-file .env down -v
