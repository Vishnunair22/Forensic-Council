name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint and types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: apps/api/.python-version

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          cd apps/api
          uv sync --extra dev

      - name: Lint with ruff
        run: cd apps/api && uv run ruff check .

      - name: Type check with pyright
        run: cd apps/api && uv run pyright core/ agents/ api/ tools/ orchestration/

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.16.1
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: apps/api/.python-version

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          cd apps/api
          uv sync --all-extras

      - name: Generate test secrets
        run: |
          echo "SIGNING_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV
          echo "LLM_API_KEY=ci-stub" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=ci-stub" >> $GITHUB_ENV

      - name: Run tests with coverage
        env:
          APP_ENV: testing
          DATABASE_URL: postgresql://postgres:test@localhost/test
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
        run: |
          cd apps/api
          uv run pytest tests/ -v --tb=short \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend-lint:
    name: Frontend lint and types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/web/.node-version
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Lint
        run: cd apps/web && npm run lint

      - name: Type check
        run: cd apps/web && npm run type-check

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/web/.node-version
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Run tests
        run: cd apps/web && npm run test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/web/.node-version
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Build
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend-lint
      - backend-test
      - frontend-lint
      - frontend-test
      - frontend-build
      - security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker buildx build --target production -t forensic-council-backend:test --build-arg PRELOAD_MODELS=0 apps/api/

      - name: Build backend migration image
        run: docker buildx build --target migration -t forensic-council-migration:test --build-arg PRELOAD_MODELS=0 apps/api/

      - name: Build frontend image
        run: >
          docker buildx build
          -f apps/web/Dockerfile
          --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}
          --build-arg INTERNAL_API_URL=http://backend:8000
          -t forensic-council-frontend:test
          .

      - name: Verify images exist
        run: |
          docker image inspect forensic-council-backend:test
          docker image inspect forensic-council-migration:test
          docker image inspect forensic-council-frontend:test

  nightly-ml-tests:
    name: Nightly ML tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
    # Scheduled: runs every day at 3am UTC
    schedule:
      - cron: '0 3 * * *'
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.16.1
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: apps/api/.python-version

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          cd apps/api
          uv sync --all-extras

      - name: Generate test secrets
        run: |
          echo "SIGNING_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=$(openssl rand -hex 32)" >> $GITHUB_ENV
          echo "LLM_API_KEY=ci-stub" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=ci-stub" >> $GITHUB_ENV

      - name: Run ML tests
        env:
          APP_ENV: testing
          DATABASE_URL: postgresql://postgres:test@localhost/test
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
        run: |
          cd apps/api
          uv run pytest tests/ -v --tb=short -m requires_ml
