# ============================================================================
# Forensic Council — Base Docker Compose Configuration
# ============================================================================
# This file defines shared service definitions. It is not meant to be used
# directly. Use one of the following:
#
#   Development (native):  docker compose -f docker-compose.infra.yml up -d
#   Development (Docker):  docker compose up --build
#   Production:            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Infrastructure Services
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: forensic_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: forensic_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  postgres:
    image: postgres:16-alpine
    container_name: forensic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forensic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forensic_pass}
      POSTGRES_DB: ${POSTGRES_DB:-forensic_council}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forensic_user} -d ${POSTGRES_DB:-forensic_council}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  # --------------------------------------------------------------------------
  # Application Services (definitions only — no build contexts)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forensic_api
    ports:
      - "8000:8000"  # optional — only needed for direct API access from host
    environment:
      - APP_NAME=forensic_council
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-forensic_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-forensic_pass}
      - POSTGRES_DB=${POSTGRES_DB:-forensic_council}
      # DATABASE_URL removed - not read by app (core/config.py builds URL from postgres_* vars)
      - SIGNING_KEY=${SIGNING_KEY:?SIGNING_KEY must be set — run: python -c "import secrets; print(secrets.token_hex(32))"}}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-["http://localhost:3001","http://localhost:3000"]}
      - HF_TOKEN=${HF_TOKEN:-}
      - EVIDENCE_STORAGE_PATH=/app/storage/evidence
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:nosuid,size=256m        # Numba needs to exec compiled code
      - /root/.cache:nosuid,size=2g  # HuggingFace model cache
    volumes:
      - evidence_data:/app/storage/evidence
      - ./backend/storage/keys:/app/storage/keys:ro
      - hf_cache:/root/.cache/huggingface

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forensic_ui
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

volumes:
  redis_data:
  qdrant_data:
  postgres_data:
  evidence_data:
  hf_cache:
