# ============================================================================
# Forensic Council — Docker Compose Override (Development)
# ============================================================================
# Enforces hot-reload for both Backend and Frontend.
# ============================================================================

services:
  backend:
    build:
      target: development
    environment:
      - RELOAD=true
      - APP_ENV=development
      - DEBUG=true
    volumes:
      - ../backend:/app:rw
      # Protect the container's venv from being overwritten by local (potentially incompatible) .venv
      - /app/.venv
      # Protect model cache volumes: the bind-mount above puts the host's
      # (empty) backend/ directory at /app, which would shadow /app/cache/*.
      # These anonymous volumes restore the named-volume mounts from the base
      # compose for each cache subdirectory so models survive host bind-mounts.
      # Named volumes from base compose (hf_cache, yolo_cache, etc.) take
      # precedence over the bind mount for these specific sub-paths.
      - hf_cache:/app/cache/huggingface:rw
      - torch_cache:/app/cache/torch:rw
      - easyocr_cache:/app/cache/easyocr:rw
      - numba_cache:/app/cache/numba_cache:rw
      - yolo_cache:/app/cache/ultralytics:rw
      - calibration_models_cache:/app/cache/calibration_models:rw

  frontend:
    build:
      target: development
    environment:
      - NODE_ENV=development
    volumes:
      - ../frontend:/app:rw
      # Protect node_modules from host overrides
      - /app/node_modules
      # Named volume so the Next.js build cache persists across container restarts.
      # Without this, every restart triggers a full ~120s recompilation on first page load
      # which can exceed the Caddy response_header_timeout and cause a "page not found" error.
      - nextjs_cache:/app/.next
    # Next.js dev-mode webpack compilation is memory-heavy (1373 modules → ~900 MB peak).
    # The production compose caps the frontend at 512 MB / 0.5 CPU which causes OOM-kills
    # during compilation, making the container restart in a loop.  Override both limits here
    # so dev mode runs stably.
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

volumes:
  nextjs_cache:
  hf_cache:
  torch_cache:
  easyocr_cache:
  numba_cache:
  yolo_cache:
  calibration_models_cache:
