global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: forensic-council

# ── Scrape Configurations ──────────────────────────────────────────────────────
scrape_configs:
  # Backend FastAPI metrics (prometheus-fastapi-instrumentator)
  # Endpoint requires METRICS_SCRAPE_TOKEN set in .env.
  - job_name: forensic_api
    metrics_path: /api/v1/metrics/raw
    bearer_token_file: /run/secrets/metrics_scrape_token
    static_configs:
      - targets:
          - backend:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: forensic_api

  # Redis exporter — if redis_exporter sidecar is added later
  # - job_name: redis
  #   static_configs:
  #     - targets: ['redis_exporter:9121']

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
