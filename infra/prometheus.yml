global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: forensic-council

scrape_configs:
  - job_name: forensic_api
    metrics_path: /api/v1/metrics/raw
    authorization:
      credentials_file: /run/secrets/metrics_scrape_token
    static_configs:
      - targets:
          - backend:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: forensic_api

  # Enable when a redis_exporter sidecar is added.
  # - job_name: redis
  #   static_configs:
  #     - targets:
  #         - redis_exporter:9121

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
