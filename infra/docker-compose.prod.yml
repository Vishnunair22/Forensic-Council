# ============================================================================
# Forensic Council — Docker Compose Override (Production)
# ============================================================================
# Ensures optimized production targets are used, tighter restart policies,
# log rotation, and suppressed host port bindings for backend/infra services.
# ============================================================================

services:
  backend:
    restart: always
    build:
      target: production
      args:
        PRELOAD_MODELS: ${PRELOAD_MODELS:-1}
        YOLO_MODEL_NAME: ${YOLO_MODEL_NAME:-yolo11n.pt}
        AASIST_MODEL_NAME: ${AASIST_MODEL_NAME:-Vansh180/deepfake-audio-wav2vec2}
    # Suppress the host-facing 8000 port — in production all traffic must flow
    # through Caddy. Direct port exposure bypasses TLS, rate limiting, and
    # security headers.
    ports: !reset []
    environment:
      RELOAD: "false"
      APP_ENV: production
      DEBUG: "false"
    secrets:
      - metrics_scrape_token
    volumes: !override
      - evidence_data:/app/storage/evidence:rw
      - signing_keys:/app/storage/keys:rw
      - reports_data:/app/reports:rw
      - hf_cache:/app/cache/huggingface:rw
      - torch_cache:/app/cache/torch:rw
      - easyocr_cache:/app/cache/easyocr:rw
      - numba_cache:/app/cache/numba_cache:rw
      - yolo_cache:/app/cache/ultralytics:rw
      - calibration_models_cache:/app/cache/calibration_models:rw
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

frontend:
    restart: always
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ""
    # Suppress direct port access — all traffic via Caddy in production
    ports: !reset []
    # Remove dev bind-mount (../apps/web:/app) — runner image is self-contained.
    # Without this, the host source tree overwrites the compiled standalone app.
    volumes: !override []
    environment:
      NODE_ENV: production
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    restart: always
    build:
      target: production
      args:
        PRELOAD_MODELS: ${PRELOAD_MODELS:-1}
        YOLO_MODEL_NAME: ${YOLO_MODEL_NAME:-yolo11n.pt}
        AASIST_MODEL_NAME: ${AASIST_MODEL_NAME:-Vansh180/deepfake-audio-wav2vec2}
    environment:
      RELOAD: "false"
      APP_ENV: production
      DEBUG: "false"
    volumes: !override
      - evidence_data:/app/storage/evidence:rw
      - signing_keys:/app/storage/keys:ro
      - reports_data:/app/reports:rw
      - hf_cache:/app/cache/huggingface:rw
      - torch_cache:/app/cache/torch:rw
      - easyocr_cache:/app/cache/easyocr:rw
      - numba_cache:/app/cache/numba_cache:rw
      - yolo_cache:/app/cache/ultralytics:rw
      - calibration_models_cache:/app/cache/calibration_models:rw
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  caddy:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  migration:
    restart: "no"

  jaeger:
    ports: !reset []

  prometheus:
    ports: !reset []
    secrets:
      - metrics_scrape_token
