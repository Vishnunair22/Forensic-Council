# ============================================================================
# Forensic Council — Infrastructure-Only Overlay (DEPRECATED)
# ============================================================================
# ⚠️  WARNING: This file is DEPRECATED and will be removed in v1.6.0.
#
# The deploy.replicas: 0 directive only works in Docker Swarm mode.
# In standalone docker compose, this file has NO EFFECT.
#
# Instead, use profiles. Edit docker-compose.yml to add profiles to services:
#   backend:    { profiles: ["app", "default"] }
#   frontend:  { profiles: ["app", "default"] }
#   caddy:      { profiles: ["app", "default"] }
#   worker:     { profiles: ["app", "default"] }
#   migration:  { profiles: ["app", "default"] }
#   jaeger:     { profiles: ["observability", "default"] }
#   prometheus: { profiles: ["observability", "default"] }
#
# Then to run infra-only:
#   docker compose -f infra/docker-compose.yml up -d redis postgres qdrant
# ============================================================================

services:
  backend:
    profiles: []
  frontend:
    profiles: []
  caddy:
    profiles: []
  worker:
    profiles: []
  migration:
    profiles: []
  jaeger:
    profiles: []
  prometheus:
    profiles: []