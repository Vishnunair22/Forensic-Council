# ============================================================================
# Forensic Council — Infrastructure-Only Overlay
# ============================================================================
# Starts only Postgres, Redis, and Qdrant — zeros out backend/frontend/caddy.
#
# ⚠️  This is a COMPOSE OVERRIDE FILE, not a standalone file.
#    It MUST always be combined with docker-compose.yml.
#    DO NOT run: docker compose -f docker-compose.infra.yml up  ← starts nothing
#
# Correct usage:
#   docker compose -f infra/docker-compose.yml \
#                  -f infra/docker-compose.infra.yml \
#                  --env-file .env up -d
# ============================================================================

services:
  backend:
    ports: !reset []
    deploy:
      replicas: 0
  frontend:
    ports: !reset []
    deploy:
      replicas: 0
  caddy:
    ports: !reset []
    deploy:
      replicas: 0
  worker:
    deploy:
      replicas: 0
  migration:
    deploy:
      replicas: 0
  jaeger:
    ports: !reset []
    deploy:
      replicas: 0
  prometheus:
    ports: !reset []
    deploy:
      replicas: 0
