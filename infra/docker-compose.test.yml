# ============================================================================
# Forensic Council — Integration Test Environment
# ============================================================================

name: forensic-council-test

services:
  redis:
    image: redis:7-alpine
    container_name: forensic_redis_test
    command: redis-server --requirepass test --loglevel warning
    environment:
      - REDISCLI_AUTH=test
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    container_name: forensic_postgres_test
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c idle_in_transaction_session_timeout=30000
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: forensic_qdrant_test
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - test_qdrant_data:/qdrant/storage

volumes:
  test_postgres_data:
  test_qdrant_data:
