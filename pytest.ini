[pytest]
# Root-level pytest config — runs all tests/backend + tests/infrastructure + tests/docker
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
# Both 'from core.auth' (direct) and 'from backend.core.config' (prefixed) styles work:
#   '.' makes the project root importable as a package namespace (enables 'backend.core')
#   'backend' makes backend's subpackages importable directly (enables 'core', 'infra', etc.)
pythonpath = . backend
addopts = -v --tb=short --no-header
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::pytest.PytestUnraisableExceptionWarning
markers =
    requires_docker: requires a running Docker stack (deselect with -m "not requires_docker")
    requires_network: requires internet access
    slow: slow tests
