# ============================================================================
# Forensic Council — Development Override
# ============================================================================
# This file is auto-loaded by Docker Compose when running:
#   docker compose -f docker/docker-compose.yml --env-file .env up --build
#
# It exposes infrastructure ports to the host for local development and
# debugging. In production, use docker-compose.prod.yml instead.
# ============================================================================

services:
  redis:
    ports:
      - "6379:6379" # Expose Redis to host for native backend dev

  postgres:
    ports:
      - "5432:5432" # Expose Postgres to host for native backend dev

  qdrant:
    ports:
      - "6333:6333" # Expose Qdrant REST to host
      - "6334:6334" # Expose Qdrant gRPC to host

  backend:
    read_only: false # Override base read_only:true — reload needs to write .pyc files
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    # Mount specific source directories for hot-reload (doesn't override .venv)
    volumes:
      - ../backend/api:/app/api
      - ../backend/core:/app/core
      - ../backend/orchestration:/app/orchestration
      - ../backend/tools:/app/tools
      - ../backend/scripts:/app/scripts
    command: ["/app/.venv/bin/python", "scripts/run_api.py"]

  frontend:
    environment:
      - NEXT_TELEMETRY_DISABLED=1
