# ============================================================================
# Forensic Council — Development Override
# ============================================================================
# This file is auto-loaded by Docker Compose when running:
#   docker compose -f docker/docker-compose.yml --env-file .env up --build
#
# It exposes infrastructure ports to the host for local development and
# debugging. In production, use docker-compose.prod.yml instead.
# ============================================================================

services:
  redis:
    ports:
      - "6379:6379"   # Expose Redis to host for native backend dev

  postgres:
    ports:
      - "5432:5432"   # Expose Postgres to host for native backend dev

  qdrant:
    ports:
      - "6333:6333"   # Expose Qdrant REST to host
      - "6334:6334"   # Expose Qdrant gRPC to host

  backend:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    # Mount source for hot-reloadable development
    # volumes:
    #   - ../backend:/app   # Uncomment for hot reload (requires CMD override)
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    environment:
      - NEXT_TELEMETRY_DISABLED=1
