# ============================================================================
# Forensic Council — Base Docker Compose Configuration
# ============================================================================
# This file defines shared service definitions. It is not meant to be used
# directly. Use one of the following:
#
#   Development (native):  docker compose -f docs/docker/docker-compose.infra.yml --env-file .env up -d
#   Development (Docker):  docker compose -f docs/docker/docker-compose.yml --env-file .env up --build
#   Production:            docker compose -f docs/docker/docker-compose.yml -f docs/docker/docker-compose.prod.yml --env-file .env up -d
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Infrastructure Services
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: forensic_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: forensic_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  postgres:
    image: postgres:16-alpine
    container_name: forensic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forensic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forensic_pass}
      POSTGRES_DB: ${POSTGRES_DB:-forensic_council}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forensic_user} -d ${POSTGRES_DB:-forensic_council}" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  # --------------------------------------------------------------------------
  # Application Services (definitions only — no build contexts)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: forensic_api
    ports:
      - "8000:8000" # optional — only needed for direct API access from host
    environment:
      - APP_NAME=forensic_council
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-forensic_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-forensic_pass}
      - POSTGRES_DB=${POSTGRES_DB:-forensic_council}
      # DATABASE_URL removed - not read by app (core/config.py builds URL from postgres_* vars)
      - SIGNING_KEY=${SIGNING_KEY:-change-me-in-development}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - CORS_ALLOWED_ORIGINS=["http://frontend:3000","http://localhost:3000","http://localhost:3001"]
      - HF_TOKEN=${HF_TOKEN:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - EVIDENCE_STORAGE_PATH=/app/storage/evidence
      - CALIBRATION_MODELS_PATH=/app/cache/calibration_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:nosuid,size=512m # Remove noexec — Numba dlopen() requires exec on /tmp
      - /app/cache:nosuid,size=4g # ML model cache (writable)
    volumes:
      - evidence_data:/app/storage/evidence:rw
      - ../../backend/storage/keys:/app/storage/keys:ro
      - hf_cache:/app/cache/huggingface:rw
      - torch_cache:/app/cache/torch:rw
      - numba_cache:/app/cache/numba_cache:rw
      - yolo_cache:/app/cache/ultralytics:rw
      - deepface_cache:/app/cache/deepface:rw
      - calibration_models:/app/cache/calibration_models:rw

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DEMO_PASSWORD: "${NEXT_PUBLIC_DEMO_PASSWORD:?Error: NEXT_PUBLIC_DEMO_PASSWORD not set}"
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: forensic_ui
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_DEMO_PASSWORD=${NEXT_PUBLIC_DEMO_PASSWORD}
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

volumes:
  redis_data:
  qdrant_data:
  postgres_data:
  evidence_data:
  hf_cache:
  torch_cache:
  numba_cache:
  yolo_cache:
  deepface_cache:
  calibration_models:
