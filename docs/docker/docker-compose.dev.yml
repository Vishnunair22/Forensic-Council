# ============================================================================
# Forensic Council — Docker Compose Override (Development)
# ============================================================================
# Enforces hot-reload for both Backend and Frontend.
# ============================================================================

services:
  backend:
    build:
      target: development
    environment:
      - RELOAD=true
      - APP_ENV=development
      - DEBUG=true
    volumes:
      - ../../backend:/app:rw
      # Protect the container's venv from being overwritten by local (potentially incompatible) .venv
      - /app/.venv

  frontend:
    build:
      target: development
    environment:
      - NODE_ENV=development
    volumes:
      - ../../frontend:/app:rw
      # Protect node_modules and Next.js cache from host overrides
      - /app/node_modules
      - /app/.next
