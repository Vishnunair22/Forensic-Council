# ============================================================================
# Forensic Council — Production Configuration
# ============================================================================
# Use this file explicitly for production deployments:
#
#   docker compose -f docs/docker/docker-compose.yml -f docs/docker/docker-compose.prod.yml --env-file .env up -d
#
# This configuration:
#   - Uses pre-built images from a registry (configure IMAGE_TAG)
#   - Sets restart policies for high availability
#   - Removes volume mounts (immutable containers)
#   - Uses production environment variables
#   - Configures proper domain for NEXT_PUBLIC_API_URL
# ============================================================================

services:
  redis:
    restart: unless-stopped
    # No port mapping in production — internal only

  qdrant:
    restart: unless-stopped
    # No port mapping in production — internal only

  postgres:
    restart: unless-stopped
    # No port mapping in production — internal only

  backend:
    image: ${DOCKER_REGISTRY:-ghcr.io/yourorg}/forensic-council-backend:${IMAGE_TAG:-latest}
    # No build context — use pre-built image
    pull_policy: always
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - HF_TOKEN=${HF_TOKEN:?HF_TOKEN is required for audio analysis}
    restart: unless-stopped
    # No volume mounts — immutable container

  frontend:
    image: ${DOCKER_REGISTRY:-ghcr.io/yourorg}/forensic-council-frontend:${IMAGE_TAG:-latest}
    # No build context — use pre-built image
    # NEXT_PUBLIC_API_URL must be set at image build time via:
    # docker build --build-arg NEXT_PUBLIC_API_URL=https://api.example.com ./frontend
    pull_policy: always
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    # No direct port mapping - served through Caddy

    # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: forensic_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
