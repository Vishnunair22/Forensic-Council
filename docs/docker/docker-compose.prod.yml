# ============================================================================
# Forensic Council — Docker Compose Override (Production)
# ============================================================================
# Ensures optimized production targets are used.
# ============================================================================

services:
  backend:
    build:
      target: production
    environment:
      - RELOAD=false
      - APP_ENV=production
      - DEBUG=false

  frontend:
    build:
      target: runner
    environment:
      - NODE_ENV=production
