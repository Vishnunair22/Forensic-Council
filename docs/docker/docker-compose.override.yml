# ============================================================================
# Forensic Council — Development Override (hot-reload)
# ============================================================================
# Usage:
#   docker compose -f docs/docker/docker-compose.yml \
#                  -f docs/docker/docker-compose.override.yml \
#                  --env-file .env up
#
# ML MODEL SHARING: Shares the same named volumes as production.
# ============================================================================

# Must match the base docker-compose.yml name for shared volumes.
name: forensic-council

services:
  redis:
    ports:
      - "6379:6379"

  postgres:
    ports:
      - "5432:5432"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  backend:
    read_only: false   # hot-reload needs to write .pyc files
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    volumes:
      - ../../backend/api:/app/api
      - ../../backend/core:/app/core
      - ../../backend/agents:/app/agents
      - ../../backend/infra:/app/infra
      - ../../backend/orchestration:/app/orchestration
      - ../../backend/tools:/app/tools
      - ../../backend/scripts:/app/scripts
    command: ["sh", "scripts/docker_entrypoint.sh"]

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - INTERNAL_API_URL=http://forensic_api:8000
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/public:/app/public
      - ../../frontend/next.config.ts:/app/next.config.ts
      - ../../frontend/tsconfig.json:/app/tsconfig.json
      - ../../frontend/package.json:/app/package.json
    command: ["npm", "run", "dev"]

# ─── Shared ML model volumes ──────────────────────────────────────────────────
volumes:
  hf_cache:
  torch_cache:
  easyocr_cache:
  numba_cache:
  yolo_cache:
  deepface_cache:
  calibration_models:
  evidence_data:
  cache_scratch:
