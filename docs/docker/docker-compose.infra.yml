# ============================================================================
# ============================================================================
# Forensic Council — Docker Compose (Infrastructure Only)
# ============================================================================
# Starts only Postgres, Redis, and Qdrant — zeros out backend/frontend/caddy.
#
# ⚠️  IMPORTANT: This is a COMPOSE OVERRIDE FILE, not a standalone file.
#    It MUST always be used together with docker-compose.yml, which defines
#    the postgres, redis, and qdrant service definitions that this file relies on.
#
# Correct usage:
#   docker compose \
#     -f docs/docker/docker-compose.yml \
#     -f docs/docker/docker-compose.infra.yml \
#     --env-file .env up -d
#
# Or via the manager scripts:
#   ./manage.sh infra          (Linux / macOS)
#   .\manage.ps1 infra         (Windows PowerShell)
#
# DO NOT run:  docker compose -f docker-compose.infra.yml up   ← starts nothing
# ============================================================================

services:
  backend:
    deploy:
      replicas: 0
  frontend:
    deploy:
      replicas: 0
  caddy:
    deploy:
      replicas: 0
