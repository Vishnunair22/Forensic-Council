repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pyright-api
        name: pyright apps/api
        language: system
        entry: bash -c 'cd apps/api && uv run pyright core/ agents/ api/ tools/ orchestration/'
        pass_filenames: false
        files: ^apps/api/.*\.py$
        types: [python]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^infra/.*\.sh$

  - repo: local
    hooks:
      - id: eslint-web
        name: eslint apps/web
        language: system
        entry: bash -c 'cd apps/web && npx --no -- eslint --config eslint.config.js "$@"'
        pass_filenames: true
        files: ^apps/web/.*\.(tsx?|jsx?)$
        types: [javascript, typescript]