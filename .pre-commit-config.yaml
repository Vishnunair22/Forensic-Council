repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright-api
        name: pyright apps/api
        language: system
        entry: python -c "import os, subprocess; os.chdir('apps/api'); subprocess.run(['uv', 'run', 'pyright', 'core/', 'agents/', 'api/', 'tools/', 'orchestration/'], check=True)"
        pass_filenames: false
        files: ^apps/api/.*\.py$
        types: [python]

  - repo: local
    hooks:
      - id: pyright-tools
        name: pyright tools/
        language: system
        entry: python -c "import os, subprocess; os.chdir('apps/api'); subprocess.run(['uv', 'run', 'pyright', 'tools/'], check=True)"
        pass_filenames: false
        files: ^apps/api/tools/.*\.py$
        types: [python]

  - repo: https://github.com/hadialqattan/pycln
    rev: v2.5.0
    hooks:
      - id: pycln
        args: [--all]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.2.0
    hooks:
      - id: eslint
        files: \.(tsx?|jsx?)$
        additional_dependencies:
          - eslint@9
          - eslint-config-next@15
          - "@eslint/eslintrc@3"
